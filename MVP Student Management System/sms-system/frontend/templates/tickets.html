<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/main.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>SMS</span>
                </a>
                <p class="logo-subtitle">Student Management</p>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-section-title">Main</p>
                    <a href="dashboard.html" class="nav-item">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="profile.html" class="nav-item">
                        <i class="fas fa-user"></i>
                        <span>My Profile</span>
                    </a>
                    <a href="modules.html" class="nav-item">
                        <i class="fas fa-book"></i>
                        <span>My Modules</span>
                    </a>
                    <a href="timetable.html" class="nav-item">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Timetable</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <p class="nav-section-title">Academic</p>
                    <a href="attendance.html" class="nav-item">
                        <i class="fas fa-clock"></i>
                        <span>Attendance</span>
                    </a>
                    <a href="assignments.html" class="nav-item">
                        <i class="fas fa-tasks"></i>
                        <span>Assignments</span>
                    </a>
                    <a href="results.html" class="nav-item">
                        <i class="fas fa-chart-line"></i>
                        <span>Results</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <p class="nav-section-title">Support</p>
                    <a href="tickets.html" class="nav-item active">
                        <i class="fas fa-headset"></i>
                        <span>Helpdesk</span>
                    </a>
                    <a href="campus-map.html" class="nav-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Campus Map</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <h1 class="page-title">Helpdesk</h1>
                <div class="header-actions">
                    <button class="notification-btn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">0</span>
                    </button>
                    <div class="user-menu dropdown">
                        <div class="user-avatar" id="user-avatar">ST</div>
                        <div class="user-info">
                            <div class="user-name" id="user-name">Student</div>
                            <div class="user-role" id="user-role">Student</div>
                        </div>
                        <button class="btn btn-link dropdown-toggle" data-bs-toggle="dropdown">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i>Profile</a></li>
                            <li><a class="dropdown-item" href="settings.html"><i class="fas fa-cog me-2"></i>Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item logout-btn" href="#"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <div class="row">
                    <!-- Create Ticket -->
                    <div class="col-lg-4 mb-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title"><i class="fas fa-plus-circle me-2 text-primary"></i>Create New Ticket</h5>
                            </div>
                            <div class="card-body">
                                <form id="ticket-form">
                                    <div class="mb-3">
                                        <label class="form-label">Department</label>
                                        <select class="form-select" name="department" required>
                                            <option value="">Select Department...</option>
                                            <option value="admissions">Admissions</option>
                                            <option value="finance">Finance</option>
                                            <option value="academic">Academic</option>
                                            <option value="facilities">Facilities</option>
                                            <option value="it_support">IT Support</option>
                                            <option value="general">General</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Priority</label>
                                        <select class="form-select" name="priority">
                                            <option value="low">Low</option>
                                            <option value="medium" selected>Medium</option>
                                            <option value="high">High</option>
                                            <option value="urgent">Urgent</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Subject</label>
                                        <input type="text" class="form-control" name="subject" required placeholder="Brief description of your issue">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" name="body" rows="5" required placeholder="Please provide detailed information about your issue"></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-primary-custom w-100">
                                        <i class="fas fa-paper-plane me-2"></i>Submit Ticket
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- My Tickets -->
                    <div class="col-lg-8 mb-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="card-title"><i class="fas fa-list me-2 text-info"></i>My Tickets</h5>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-outline active" data-filter="all">All</button>
                                    <button class="btn btn-sm btn-outline" data-filter="open">Open</button>
                                    <button class="btn btn-sm btn-outline" data-filter="resolved">Resolved</button>
                                </div>
                            </div>
                            <div class="card-body p-0">
                                <div id="tickets-list">
                                    <div class="text-center py-4">
                                        <div class="spinner-border text-info" role="status">
                                            <span class="visually-hidden">Loading...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/app.js"></script>
    <script>
        // Load tickets
        async function loadTickets(status = 'all') {
            try {
                let endpoint = '/tickets/my';
                if (status !== 'all') {
                    endpoint += `?status=${status}`;
                }
                
                const tickets = await API.get(endpoint);
                const container = document.getElementById('tickets-list');
                
                if (!tickets || tickets.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state py-5">
                            <i class="fas fa-ticket-alt"></i>
                            <h5>No tickets found</h5>
                            <p>Create a new ticket to get support</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th>Ticket #</th>
                                    <th>Subject</th>
                                    <th>Department</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tickets.map(ticket => `
                                    <tr>
                                        <td><strong>${ticket.ticket_number}</strong></td>
                                        <td>${ticket.subject}</td>
                                        <td><span class="badge bg-secondary">${ticket.department}</span></td>
                                        <td>${UI.getStatusBadge(ticket.status)}</td>
                                        <td>${UI.formatDate(ticket.created_at)}</td>
                                        <td>
                                            <a href="ticket-detail.html?id=${ticket.id}" class="btn btn-sm btn-outline">View</a>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                
            } catch (error) {
                console.error('Failed to load tickets:', error);
            }
        }
        
        // Create ticket
        document.getElementById('ticket-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Submitting...';
            
            try {
                const result = await API.post('/tickets/', {
                    department: formData.get('department'),
                    priority: formData.get('priority'),
                    subject: formData.get('subject'),
                    body: formData.get('body'),
                });
                
                if (result) {
                    UI.showToast('Ticket created successfully!', 'success');
                    e.target.reset();
                    loadTickets();
                }
            } catch (error) {
                UI.showToast('Failed to create ticket: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Submit Ticket';
            }
        });
        
        // Filter buttons
        document.querySelectorAll('[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadTickets(btn.dataset.filter);
            });
        });
        
        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadTickets();
        });
    </script>
</body>
</html>
